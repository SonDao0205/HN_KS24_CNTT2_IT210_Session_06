<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Hệ thống quản lý khóa học</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header class="bg-primary text-white py-3 shadow-sm border-bottom border-secondary">
        <div class="container text-center">
            <h1 class="display-5 fw-bold mb-1">
                <i class="bi bi-mortarboard-fill"></i> EDU-PATH
            </h1>
            <p class="text-white fst-italic mb-0">Nơi bắt đầu tri thức - Dẫn lối tương lai</p>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary sticky-top shadow-sm border-bottom border-black">
        <div class="container">

            <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item">
                        <a class="nav-link active fs-5" th:href="@{/course/list}">
                            <i class="bi bi-card-list me-1"></i> Danh sách khóa học
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5" th:href="@{/course/consulting}">
                            <i class="bi bi-headset me-1"></i> Đăng ký tư vấn
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<!--    layout:fragment="content" để dánh dấu là phần main trước khi viết-->
    <main class="container my-5 flex-grow-1" layout:fragment="content">
    </main>

    <footer class="bg-dark text-white text-center py-2 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 Hệ thống quản lý khóa học <strong>EDU-PATH</strong>.</p>
            <p class="mb-0 text-white">Sinh viên thực hiện: Nhóm 2.</p>
        </div>
    </footer>
</body>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
