<!DOCTYPE html>
<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<!--
    th:action: Xác định nơi nhận dữ liệu.
    th:object: Xác định đối tượng mà Form này đang đại diện
    th:field: Tự động tạo ID, Name và điền giá trị cho ô nhập.
-->
<div layout:fragment="content">
    <div class="container py-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">CẬP NHẬT KHÓA HỌC</h4>
            </div>

            <div class="card-body">
                <form th:action="@{/course/update}" method="post">

                    <input type="hidden" name="code" th:value="${course.courseCode}" />

                    <div class="form-group mb-3">
                        <label class="fw-bold">Tên khóa học:</label>
                        <input type="text" class="form-control bg-light"
                               th:value="${course.courseName}" readonly />
                    </div>

                    <div class="form-group mb-3">
                        <label class="fw-bold">Học phí (VNĐ):</label>
                        <input type="number" class="form-control" name="fee"
                               th:value="${course.fee}" required step="1000" />
                    </div>

                    <div class="form-group mb-3">
                        <label class="fw-bold">Ngày khai giảng:</label>
                        <input type="date" class="form-control" name="startDate"
                               th:value="${course.startDate}" required />
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success px-4">Lưu thay đổi</button>
                        <a th:href="@{/course/list}" class="btn btn-secondary px-4 ms-2">Hủy bỏ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
