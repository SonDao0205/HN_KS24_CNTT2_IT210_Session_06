<!DOCTYPE html>
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{main-layout}">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<!--
    th:action: Xác định nơi nhận dữ liệu.
    th:object: Xác định đối tượng mà Form này đang đại diện
    th:field: Tự động tạo ID, Name và điền giá trị cho ô nhập.
-->
<div layout:fragment="content" class="container mt-4">
    <div class="card shadow-lg mx-auto" style="max-width: 500px; border-radius: 15px;">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0"><i class="bi bi-pencil-square"></i> CẬP NHẬT KHÓA HỌC</h4>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/course/update}" method="post">
                <input type="hidden" name="code" th:value="${course.courseCode}" />

                <div class="form-group mb-3">
                    <label class="fw-bold text-secondary">Tên khóa học:</label>
                    <input type="text" class="form-control bg-light" th:value="${course.courseName}" readonly />
                </div>

                <div class="form-group mb-3">
                    <label class="fw-bold text-secondary">Học phí (VNĐ):</label>
                    <input type="number" class="form-control" name="fee" th:value="${course.fee}" required />
                </div>

                <div class="form-group mb-4">
                    <label class="fw-bold text-secondary">Ngày khai giảng:</label>
                    <input type="date" class="form-control" name="startDate" th:value="${course.startDate}" required />
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-success px-5 shadow-sm">Lưu thay đổi</button>
                    <a th:href="@{/course/list}" class="btn btn-outline-secondary px-4 shadow-sm ml-2">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
