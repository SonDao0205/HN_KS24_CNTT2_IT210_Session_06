<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main-layout}">

<head>
    <title>Danh sách khóa học</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<div layout:fragment="content" class="container mt-4">
    <h2 class="mb-4 text-primary fw-bold">DANH MỤC KHÓA HỌC</h2>

    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!--Lọc và Tìm kiếm-->
    <form th:action="@{/course/list}" method="get" class="row g-3 mb-4 p-3 bg-light border rounded shadow-sm">
        <div class="col-md-4">
            <select class="form-select" name="level">
                <option value="ALL" th:selected="${level == 'ALL' or level == null}">-- Tất cả trình độ --</option>
                <option value="BEGINNER" th:selected="${level == 'BEGINNER'}">Beginner</option>
                <option value="INTERMEDIATE" th:selected="${level == 'INTERMEDIATE'}">Intermediate</option>
                <option value="ADVANCED" th:selected="${level == 'ADVANCED'}">Advanced</option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="number" name="maxFee" class="form-control"
                   th:value="${maxFee}" placeholder="Học phí tối đa (VNĐ)">
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Tìm kiếm
            </button>
        </div>
    </form>

    <!--Bảng-->
    <table class="table table-hover table-bordered shadow-sm bg-white">
        <thead class="table-dark text-center">
        <tr>
            <th>Mã khóa</th>
            <th>Tên khóa học</th>
            <th>Trình độ</th>
            <th>Học phí</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${courses}">
            <td class="fw-bold text-center" th:text="${c.courseCode}">Mã</td>
            <td th:text="${c.courseName}">Tên khóa học</td>
            <td class="text-center">
                <span th:if="${c.level.name() == 'BEGINNER'}" class="badge bg-info">Beginner</span>
                <span th:if="${c.level.name() == 'INTERMEDIATE'}" class="badge bg-warning text-dark">Intermediate</span>
                <span th:if="${c.level.name() == 'ADVANCED'}" class="badge bg-danger">Advanced</span>
            </td>

            <td class="text-end" th:text="${#numbers.formatDecimal(c.fee, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">0 VNĐ</td>

            <td class="text-center">
                <span th:if="${c.studentCount >= c.maxStudents}" class="badge bg-secondary">HẾT CHỖ</span>
                <span th:if="${c.studentCount < c.maxStudents}" class="badge bg-success">CÒN TRỐNG</span>
            </td>

            <td>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/course/detail/{code}(code=${c.courseCode})}" class="btn btn-sm btn-outline-info">
                        Chi tiết
                    </a>

                    <a th:href="@{/course/edit/{code}(code=${c.courseCode})}" class="btn btn-sm btn-outline-warning text-dark">
                        Cập nhật
                    </a>

                    <form th:action="@{/course/delete/{code}(code=${c.courseCode})}" method="post"
                          th:onsubmit="return confirm('Bạn có chắc chắn muốn hủy khóa học [[${c.courseName}]]?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Hủy khóa học</button>
                    </form>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(courses)}">
            <td colspan="6" class="text-center text-muted p-4">Không tìm thấy khóa học nào phù hợp.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
